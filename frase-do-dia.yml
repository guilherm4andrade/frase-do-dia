name: Frase do Dia

on:
  schedule:
    # 00:00 America/Sao_Paulo (UTC-3) = 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install pillow

      - name: Rodar atualização
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          IMAGE_BLOCK_ID: ${{ secrets.IMAGE_BLOCK_ID }}
          IMAGE_PUBLIC_URL: ${{ secrets.IMAGE_PUBLIC_URL }}
        run: python update_frase.py

      - name: Commit estado e imagem
        run: |
          git config user.name "nemesis-bot"
          git config user.email "nemesis-bot@users.noreply.github.com"
          git add last_index.txt docs/frase.png
          git diff --staged --quiet || git commit -m "chore: atualiza frase e card do dia"
          git push
